milestones:
  - title: "M1.0 Discovery & Prototype"
    previous_title: "V1.0 - Discovery & Prototype"
    description: "Validate tabletop workflows, glossary, screen flow, data model, and dashboard prototype. Exit: scope and interaction assumptions are evidence-backed."
  - title: "M1.1 Technical Foundation"
    previous_title: "V1.0 - Technical Foundation"
    description: "Flutter architecture, CI, design tokens, Drift persistence, and Scryfall adapter. Exit: both platforms launch, state survives restart, policy-aware card search and tests run in CI."
  - title: "M1.2 Deck Library"
    previous_title: "V1.0 - Deck Library"
    description: "Deck CRUD, search, caching, import/export, printings, statistics, and advisory validation. Exit: a 60-card deck imports and reopens offline."
  - title: "M1.3 Game Companion MVP"
    previous_title: "V1.0 - Game Companion MVP"
    description: "Setup, life, counters, timers, phases, event history, undo, snapshots, and recovery. Exit: a full recoverable game works without a deck."
  - title: "M1.4 Reminders & Effects"
    previous_title: "V1.0 - Reminders & Effects"
    description: "Triggered reminders, effect expiration, card-linked reminders, and readable history. Exit: timing and ownership behavior is correct and tested."
  - title: "M1.5 Release Readiness"
    previous_title: "V1.0 - Release Readiness"
    description: "Accessibility, performance, offline/recovery, privacy, attribution, migrations, store assets, and beta validation. Exit: initial local-companion release criteria are met."
  - title: "M2.0 Synchronized Sessions"
    previous_title: "V2.0 - Synchronized Sessions"
    description: "Room lifecycle, authority, sequencing, reconnect, privacy boundaries, and synchronized public state."
  - title: "Future backlog (unordered)"
    previous_title: "Backlog - Future"
    description: "Validated opportunities beyond the currently planned local and synchronized companion scope; not a delivery commitment."
