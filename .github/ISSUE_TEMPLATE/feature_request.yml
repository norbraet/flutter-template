name: Feature request
description: Propose a user outcome that fits OrbiGathering's product vision.
title: "[Feature]: "
labels: ["type: feature", "status: needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Who has this problem, during what tabletop workflow, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the outcome without prescribing an implementation.
    validations:
      required: true
  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      options: [Beginner player, Casual regular player, Contributor or maintainer, Other]
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Proposed workflow
      description: Explain when the feature is used and how many interactions it adds or removes during play.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] Given ..., when ..., then ..."
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundaries
    attributes:
      label: Product fit
      options:
        - label: This complements the physical table instead of reproducing it digitally.
          required: true
        - label: This does not require OrbiGathering to act as an authoritative Magic rules engine.
          required: true
