# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# very_good_analysis is Very Good Ventures' curated lint set: a superset of
# the Flutter/Dart team's own recommendations, plus rules for immutability,
# consistent style, and common correctness mistakes. It is intentionally
# stricter than the stock `flutter_lints` default — see
# https://pub.dev/packages/very_good_analysis for the full rule list and
# rationale for each one.
include: package:very_good_analysis/analysis_options.yaml

linter:
  # The lint rules applied to this project can be customized in the section
  # below to disable rules from the included ruleset above or to enable
  # additional rules. A list of all available lints and their documentation
  # is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the section
  # below, it can also be suppressed for a single line of code or a specific
  # Dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    # public_member_api_docs: false  # Uncomment to stop requiring /// docs on every public API

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
